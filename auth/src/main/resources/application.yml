server:
  port: 8082
  servlet:
    context-path: /auth
spring:
  application:
    name: auth
  cloud:
    nacos:
      server-addr: localhost:8848
      username: nacos
      password: nacos
      discovery:
        namespace: 418ac824-016b-4eff-bbde-82b7ce26305d
        import-check:
          enabled: false
      config:
        namespace: 418ac824-016b-4eff-bbde-82b7ce26305d
  config:
    import:
      - optional:nacos:auth.yml?group=DEFAULT_GROUP&refreshEnabled=true

  data:
    redis:
      host: localhost
      port: 6379
      password:
  datasource:
    dynamic:
      primary: master
      datasource:
        # 主库数据源
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${FE_IP}:3306/test_qms?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
          username: root
          password: ${FE185PWD}
          # 从库数据源
          # slave:
          #   driver-class-name: com.mysql.cj.jdbc.Driver
          #   url: jdbc:mysql://localhost:3306/my_test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
          #   username: root
          #   password: root

# mybatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.example.auth.mapper
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: full

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [userId=%X{userId}] %logger{36} - %msg%n"
  level:
    org.springframework.web.client: DEBUG